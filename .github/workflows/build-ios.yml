name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios.yml"
      - "App.js"
      - "app.json"
      - "babel.config.js"
      - "index.js"
      - "ios/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "assets/**"

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      CERT_DIR: 证书_00008120-000908503A31A01E
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      NODE_OPTIONS: --max_old_space_size=4096
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve app config
        run: |
          set -euo pipefail

          BUNDLE_ID="$(node -e "const app=require('./app.json'); console.log(app.expo?.ios?.bundleIdentifier || '')")"
          if [ -z "$BUNDLE_ID" ]; then
            echo "未读取到 bundleIdentifier"
            exit 1
          fi

          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Prepare signing files
        run: |
          set -euo pipefail

          CERT_FILE="$RUNNER_TEMP/cert.p12"
          PROFILE_FILE="$RUNNER_TEMP/profile.mobileprovision"

          if [ -n "${{ secrets.IOS_P12_BASE64 }}" ] && [ -n "${{ secrets.IOS_MOBILEPROVISION_BASE64 }}" ] && [ -n "${{ secrets.IOS_P12_PASSWORD }}" ]; then
            python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_FILE"]).write_bytes(base64.b64decode(os.environ["IOS_P12_BASE64"])); pathlib.Path(os.environ["PROFILE_FILE"]).write_bytes(base64.b64decode(os.environ["IOS_MOBILEPROVISION_BASE64"]))'
            CERT_PASSWORD="${{ secrets.IOS_P12_PASSWORD }}"
          else
            CERT_FILE="$CERT_DIR/证书文件.p12"
            PROFILE_FILE="$CERT_DIR/描述文件.mobileprovision"
            PASSWORD_FILE="$CERT_DIR/密码.txt"

            if [ ! -f "$CERT_FILE" ] || [ ! -f "$PROFILE_FILE" ] || [ ! -f "$PASSWORD_FILE" ]; then
              echo "缺少 iOS 签名文件，需提供仓库内证书目录或 GitHub Secrets。"
              exit 1
            fi

            CERT_PASSWORD="$(sed 's/^密码[:：]//' "$PASSWORD_FILE" | tr -d '\r\n[:space:]')"
          fi

          printf 'CERT_FILE=%s\n' "$CERT_FILE" >> "$GITHUB_ENV"
          printf 'PROFILE_FILE=%s\n' "$PROFILE_FILE" >> "$GITHUB_ENV"
          printf 'CERT_PASSWORD<<EOF\n%s\nEOF\n' "$CERT_PASSWORD" >> "$GITHUB_ENV"
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}

      - name: Import signing certificate and provisioning profile
        run: |
          set -euo pipefail

          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$CERT_FILE" -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_FILE" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")
          SIGN_IDENTITY="$(security find-identity -v -p codesigning build.keychain | awk -F'\"' '/\"/ {print $2; exit}')"

          if [ -z "$SIGN_IDENTITY" ]; then
            echo "未找到可用的签名证书"
            security find-identity -v -p codesigning build.keychain || true
            exit 1
          fi

          if /usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$PROFILE_PLIST" | grep -q true; then
            EXPORT_METHOD="development"
          elif /usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices:0' "$PROFILE_PLIST" >/dev/null 2>&1; then
            EXPORT_METHOD="ad-hoc"
          else
            EXPORT_METHOD="app-store"
          fi

          cp "$PROFILE_FILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "TEAM_ID=$TEAM_ID"
            echo "EXPORT_METHOD=$EXPORT_METHOD"
            echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
            echo "SIGN_IDENTITY=$SIGN_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Resolve Xcode container and scheme
        run: |
          set -euo pipefail

          WORKSPACE="ios/app.xcworkspace"
          if [ ! -d "$WORKSPACE" ]; then
            WORKSPACE="ios/app.xcodeproj/project.xcworkspace"
          fi

          PROJECT="$(find ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)"
          if [ -d "$WORKSPACE" ]; then
            SCHEME="$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'data = JSON.parse(STDIN.read); schemes = data.dig("workspace", "schemes") || data.dig("project", "schemes") || []; preferred = schemes.find { |name| !name.start_with?("Pods-", "Expo", "React", "EX", "hermes") } || schemes.first; puts((preferred || "").to_s)')"
            echo "XCODE_CONTAINER=$WORKSPACE" >> "$GITHUB_ENV"
            echo "XCODE_CONTAINER_KIND=workspace" >> "$GITHUB_ENV"
          elif [ -n "$PROJECT" ]; then
            SCHEME="$(xcodebuild -list -json -project "$PROJECT" | ruby -rjson -e 'data = JSON.parse(STDIN.read); schemes = data.dig("project", "schemes") || data.dig("workspace", "schemes") || []; preferred = schemes.find { |name| !name.start_with?("Pods-", "Expo", "React", "EX", "hermes") } || schemes.first; puts((preferred || "").to_s)')"
            echo "XCODE_CONTAINER=$PROJECT" >> "$GITHUB_ENV"
            echo "XCODE_CONTAINER_KIND=project" >> "$GITHUB_ENV"
          else
            echo "未找到 iOS 原生工程文件"
            exit 1
          fi

          if [ -z "$SCHEME" ]; then
            echo "未找到可用的主应用 Scheme"
            exit 1
          fi

          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          set -euo pipefail

          if [ "$XCODE_CONTAINER_KIND" = "workspace" ]; then
            xcodebuild \
              -workspace "$XCODE_CONTAINER" \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              -archivePath "$RUNNER_TEMP/app.xcarchive" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
              clean archive
          else
            xcodebuild \
              -project "$XCODE_CONTAINER" \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              -archivePath "$RUNNER_TEMP/app.xcarchive" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
              clean archive
          fi

      - name: Export IPA
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/exported" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/exported/*.ipa
          if-no-files-found: error

      - name: Upload archive on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-debug
          path: |
            ${{ runner.temp }}/app.xcarchive
            ${{ runner.temp }}/ExportOptions.plist
            ${{ runner.temp }}/profile.plist
          if-no-files-found: ignore

      - name: Cleanup signing keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
